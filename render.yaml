databases:
  - name: edson-lavanderia-db
    databaseName: edson_lavanderia
    user: edson
    region: ohio
    plan: free

services:
  - type: web
    name: edson-lavanderia-api
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edson-lavanderia-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "c.vicentinni@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        value: "wumh kllu emir aqjb"
      - key: DEFAULT_FROM_EMAIL
        value: "Edson Lavanderia <c.vicentinni@gmail.com>"
      - key: ADMIN_EMAIL
        value: "info@washlab.pt"
